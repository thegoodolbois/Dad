<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAD</title>
<style>
  :root{
    --obsidian:#07070a;
    --obsidian-2:#0d0e12;
    --panel:#14161b;
    --panel-2:#1b1e25;
    --gunmetal:#2a2d35;
    --line:#2c2f37;
    --ember:#ff6a2b;
    --ember-2:#ff3d00;
    --ember-soft:#ffae42;
    --holo-cyan:#3df3ff;
    --holo-purple:#b66bff;
    --green:#6bdc8a;
    --text:#f5f2ee;
    --text-dim:#a8a5a1;
    --text-faint:#6f6c69;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--obsidian);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    overflow-x:hidden;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
  img,svg{display:block;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}

  /* simplified styles for Pages */
  #hero{position:relative; min-height:60vh; display:flex; align-items:center; padding:80px 0;}
  .hero-inner{display:flex; gap:40px; align-items:center; width:100%;}
  .hero-text{flex:1}
  .hero-art{flex:1; display:flex; justify-content:center}
  .mascot{width:100%; max-width:920px; border-radius:12px; object-fit:cover}
  nav{position:fixed; top:0; left:0; right:0; background:rgba(7,7,10,0.8); backdrop-filter:blur(8px); padding:12px 24px; border-bottom:1px solid var(--line)}
  .logo{font-weight:800; background:linear-gradient(90deg,var(--ember-soft),var(--ember-2)); -webkit-background-clip:text; color:transparent}
  footer{padding:40px 0; color:var(--text-dim); text-align:center}
</style>
</head>
<body>
<nav><div class="wrap"><span class="logo">DAD</span></div></nav>
<main style="padding-top:70px">
  <section id="hero">
    <div class="wrap hero-inner">
      <div class="hero-text">
        <h1 style="font-size:clamp(28px,4vw,44px);margin:0 0 12px">Build Yourself. Build Your <span style="background:linear-gradient(90deg,var(--ember-soft),var(--ember-2));-webkit-background-clip:text;color:transparent">Family</span>.</h1>
        <p style="color:var(--text-dim);max-width:580px">A meme coin that grows into a self-improving economic organism — AI agents, dynamic NFTs, real products, and a treasury that compounds every dollar back into the ecosystem.</p>
      </div>
      <div class="hero-art">
        <!-- images are in docs/ so use relative paths -->
        <img class="mascot" src="IMG_0037.jpeg" alt="Dad mascot wide banner">
      </div>
    </div>
  </section>
</main>
<footer>
  <div class="wrap">
    <div style="display:flex;align-items:center;gap:12px;justify-content:center">
      <img src="IMG_0030.jpeg" alt="avatar" style="width:58px;height:58px;border-radius:10px;object-fit:cover">
      <div style="text-align:left">
        <div style="font-weight:800">DAD</div>
        <div style="color:var(--text-dim);font-size:13px">Community project — not financial advice.</div>
      </div>
    </div>
    <div style="margin-top:18px">© 2026 DAD</div>
  </div>
</footer>
</body>
</html>
